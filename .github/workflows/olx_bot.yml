name: Run OLX Telegram Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 1. Mengunduh database pkl dari sesi sebelumnya (jika ada)
    - name: Download Session Cache
      uses: actions/download-artifact@v4
      with:
        name: bot-database
        path: .
      continue-on-error: true

    - name: Run Script
      env:
        TOKEN: ${{ secrets.BOT_TOKEN }}      
        CHAT_ID: ${{ secrets.CHAT_ID }}      
        URL: ${{ secrets.API_URL }}          
      run: python bot.py

    # 2. Menyimpan kembali database pkl terbaru ke server GitHub
    - name: Upload Session Cache
      uses: actions/upload-artifact@v4
      with:
        name: bot-database
        path: notified_ads.pkl
        retention-days: 1
