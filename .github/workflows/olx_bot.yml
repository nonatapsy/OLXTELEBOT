name: Run OLX Telegram Bot

on:
  schedule:
    # Mengatur bot berjalan otomatis setiap 6 jam (Format Cron)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Tombol tambahan agar bisa dijalankan manual kapan saja

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        API_URL: ${{ secrets.API_URL }}
      run: python main.py
      
